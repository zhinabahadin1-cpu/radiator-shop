async function sbSelect(table) {
  const res = await fetch(REST + table + "?select=*", { headers: baseHeaders });
  if (!res.ok) throw new Error(await res.text());
  return res.json();
}
async function sbInsert(table, row) {
  const res = await fetch(REST + table, {
    method: "POST",
    headers: Object.assign({}, baseHeaders, { Prefer: "return=representation" }),
    body: JSON.stringify(row)
  });
  if (!res.ok) throw new Error(await res.text());
  return res.json();
}
async function sbUpdate(table, id, patch) {
  const res = await fetch(REST + table + "?id=eq." + encodeURIComponent(id), {
    method: "PATCH",
    headers: Object.assign({}, baseHeaders, { Prefer: "return=representation" }),
    body: JSON.stringify(patch)
  });
  if (!res.ok) throw new Error(await res.text());
  return res.json();
}
async function sbDelete(table, id) {
  const res = await fetch(REST + table + "?id=eq." + encodeURIComponent(id), { method: "DELETE", headers: baseHeaders });
  if (!res.ok) throw new Error(await res.text());
  return true;
}

function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2,8); }

function StockGauge(props) {
  const stock = props.stock, minStock = props.minStock;
  const ratio = Math.max(0, Math.min(1, stock / (Math.max(minStock,1)*3)));
  let color = "#1F6F78", label = "باشە";
  if (stock <= 0) { color = "#C0392B"; label = "نەماوە"; }
  else if (stock <= minStock) { color = "#E8A33D"; label = "کەمە"; }
  return e("div", { style:{display:"flex",alignItems:"center",gap:8,minWidth:110} },
    e("div", { style:{flex:1,height:8,borderRadius:999,background:"#E3E8EA",overflow:"hidden",position:"relative"} },
      e("div", { style:{position:"absolute",inset:0,width:(ratio*100)+"%",background:color,borderRadius:999,transition:"width .3s ease"} })
    ),
    e("span", { style:{fontSize:12,fontWeight:600,color,whiteSpace:"nowrap"} }, label)
  );
}

function SellTab(props) {
  const products = props.products, customers = props.customers;
  const [query, setQuery] = useState("");
  const [selected, setSelected] = useState(null);
  const [qty, setQty] = useState(1);
  const [customerId, setCustomerId] = useState("");
  const [newCustomerName, setNewCustomerName] = useState("");
  const [salePrice, setSalePrice] = useState("");
  const [busy, setBusy] = useState(false);

  const results = useMemo(() => {
    if (!query.trim()) return [];
    const q = query.trim().toLowerCase();
    return products.filter(p => p.name.toLowerCase().includes(q) || p.code.toLowerCase().includes(q));
  }, [query, products]);

  const confirmSale = async () => {
    if (!selected || busy) return;
    if (qty <= 0) { props.showToast("بڕی داواکراو دروست نییە","error"); return; }
    if (qty > selected.stock) { props.showToast("بڕی داواکراو زیاترە لەوەی هەیە","error"); return; }
    const unitPrice = Number(salePrice) || 0;
    if (unitPrice <= 0) { props.showToast("نرخی فرۆشتن بنووسە","error"); return; }
    setBusy(true);
    let custName = "کڕیاری نەناسراو";
    if (newCustomerName.trim()) {
      const nc = await props.addCustomer({ id: uid(), name: newCustomerName.trim(), phone: "" });
      if (nc) custName = nc.name;
    } else if (customerId) {
      const c = customers.find(c => c.id === customerId);
      if (c) custName = c.name;
    }
    const sale = { id: uid(), productId: selected.id, productName: selected.name, productCode: selected.code, qty, unitPrice: unitPrice, total: qty*unitPrice, customerName: custName, date: new Date().toISOString() };
    const ok = await props.recordSale(sale, selected);
    setBusy(false);
    if (ok) {
      props.showToast("فرۆشرا: " + selected.name + " × " + qty);
      setSelected(null); setQuery(""); setQty(1); setCustomerId(""); setNewCustomerName(""); setSalePrice("");
    }
  };

  return e("div", null,
    e("h1", { style:{fontSize:24,fontWeight:800,marginBottom:22} }, "فرۆشتن"),
    e("div", { style:{position:"relative",marginBottom:18} },
      e("span", { style:{position:"absolute",right:16,top:"50%",transform:"translateY(-50%)",color:"#8B96A0"} }, "🔍"),
      e("input", { autoFocus:true, value:query, onChange:(ev)=>{ setQuery(ev.target.value); setSelected(null); }, placeholder:"گەڕان بە ناو یان کۆدی ڕادیەتەر...",
        style:{ width:"100%", padding:"14px 46px 14px 16px", borderRadius:12, border:"1px solid #DDE3E6", fontSize:15, background:"#fff", boxSizing:"border-box" } })
    ),
    (!selected && results.length > 0) ? e("div", { style:{display:"flex",flexDirection:"column",gap:8,marginBottom:20} },
      results.map((p) => e("button", { key:p.id, onClick:()=>{ setSelected(p); setSalePrice(String(p.price)); },
        style:{ textAlign:"right", background:"#fff", border:"1px solid #DDE3E6", borderRadius:12, padding:"14px 16px", cursor:"pointer", display:"flex", justifyContent:"space-between", alignItems:"center", width:"100%" } },
        e("div", null,
          e("div", { style:{fontWeight:700,fontSize:15} }, p.name),
          e("div", { style:{fontSize:12.5,color:"#8B96A0",fontFamily:"'JetBrains Mono', monospace",marginTop:2} }, "کۆد: " + p.code)
        ),
        e("div", { style:{textAlign:"left"} },
          e("div", { style:{fontFamily:"'JetBrains Mono', monospace",fontWeight:700} }, fmtNum(p.price)+" د.ع"),
          e(StockGauge, { stock:p.stock, minStock:p.minStock })
        )
      ))
    ) : null,
    (!selected && query.trim() && results.length === 0) ? e("div", { style:{color:"#8B96A0",fontSize:14,marginBottom:20} }, "هیچ ڕادیەتەرێک بەم ناو/کۆدە نەدۆزرایەوە") : null,
    selected ? e("div", { style:{background:"#fff",borderRadius:14,padding:22,border:"1px solid #DDE3E6"} },
      e("div", { style:{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:18} },
        e("div", null,
          e("div", { style:{fontWeight:800,fontSize:17} }, selected.name),
          e("div", { style:{fontSize:12.5,color:"#8B96A0",fontFamily:"'JetBrains Mono', monospace",marginTop:3} }, "کۆد: " + selected.code + " · مایە: " + fmtNum(selected.costPrice) + " د.ع · " + selected.stock + " دانە لە کۆگا")
        ),
        e("button", { onClick:()=>{setSelected(null);setSalePrice("");}, style:{border:"none",background:"none",cursor:"pointer",fontSize:18,color:"#8B96A0"} }, "✖")
      ),
      e("div", { style:{display:"flex",gap:16,marginBottom:16,flexWrap:"wrap"} },
        e("div", { style:{flex:1,minWidth:110} },
          e("label", { style:{fontSize:13,color:"#6B7580",display:"block",marginBottom:6} }, "بڕ"),
          e("input", { type:"number", min:1, value:qty, onChange:(ev)=>setQty(Number(ev.target.value)), style:{width:"100%",padding:"10px 12px",borderRadius:9,border:"1px solid #DDE3E6",fontFamily:"'JetBrains Mono', monospace",fontSize:15,boxSizing:"border-box"} })
        ),
        e("div", { style:{flex:1,minWidth:140} },
          e("label", { style:{fontSize:13,color:"#6B7580",display:"block",marginBottom:6} }, "نرخی فرۆشتن (د.ع)"),
          e("input", { type:"number", value:salePrice, onChange:(ev)=>setSalePrice(ev.target.value), style:{width:"100%",padding:"10px 12px",borderRadius:9,border:"1px solid #DDE3E6",fontFamily:"'JetBrains Mono', monospace",fontSize:15,boxSizing:"border-box"} })
        )
      ),
      e("div", { style:{marginBottom:16} },
        e("label", { style:{fontSize:13,color:"#6B7580",display:"block",marginBottom:6} }, "کڕیار (دڵخوازە)"),
        e("select", { value:customerId, onChange:(ev)=>{ setCustomerId(ev.target.value); setNewCustomerName(""); }, style:{width:"100%",padding:"10px 12px",borderRadius:9,border:"1px solid #DDE3E6",fontSize:14.5,boxSizing:"border-box"} },
          [e("option", { key:"none", value:"" }, "کڕیاری نەناسراو")].concat(customers.map((c) => e("option", { key:c.id, value:c.id }, c.name)))
        )
      ),
      e("div", { style:{marginBottom:18} },
        e("input", { value:newCustomerName, onChange:(ev)=>{ setNewCustomerName(ev.target.value); setCustomerId(""); }, placeholder:"یان ناوی کڕیارێکی نوێ بنووسه...", style:{width:"100%",padding:"10px 12px",borderRadius:9,border:"1px solid #DDE3E6",fontSize:14,boxSizing:"border-box"} })
      ),
      e("div", { style:{display:"flex",justifyContent:"space-between",padding:"10px 0",borderTop:"1px dashed #DDE3E6",fontSize:13.5,color:"#6B7580"} },
        e("span", null, "قازانج"),
        e("span", { style:{fontFamily:"'JetBrains Mono', monospace",fontWeight:700,color: (qty*((Number(salePrice)||0)-selected.costPrice))>=0 ? "#1F6F78":"#C0392B"} }, fmtNum(qty*((Number(salePrice)||0)-selected.costPrice))+" د.ع")
      ),
      e("div", { style:{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"10px 0 16px 0"} },
        e("span", { style:{fontSize:14,color:"#6B7580"} }, "کۆی گشتی"),
        e("span", { style:{fontSize:22,fontWeight:800,fontFamily:"'JetBrains Mono', monospace"} }, fmtNum(qty*(Number(salePrice)||0))+" د.ع")
      ),
      e("button", { onClick:confirmSale, disabled:busy, style:{width:"100%",padding:"14px",borderRadius:10,border:"none",background: busy ? "#8FB9BD" : "#1F6F78",color:"#fff",fontWeight:700,fontSize:15,cursor: busy ? "default" : "pointer",display:"flex",alignItems:"center",justifyContent:"center",gap:8} },
        busy ? "چاوەڕوان بە..." : "✔ جێبەجێکردنی فرۆشتن"
      )
    ) : null
  );
}

function InventoryTab(props) {
  const products = props.products;
  const [query, setQuery] = useState("");
  const [showForm, setShowForm] = useState(false);
  const [editingId, setEditingId] = useState(null);
  const [form, setForm] = useState(emptyForm());
  const [confirmDeleteId, setConfirmDeleteId] = useState(null);
  const [busy, setBusy] = useState(false);

  const filtered = useMemo(() => {
    if (!query.trim()) return products;
    const q = query.trim().toLowerCase();
    return products.filter(p => p.name.toLowerCase().includes(q) || p.code.toLowerCase().includes(q));
  }, [query, products]);

  const openAdd = () => { setForm(emptyForm()); setEditingId(null); setShowForm(true); };
  const openEdit = (p) => { setForm({ name:p.name, code:p.code, price:String(p.price), stock:String(p.stock), minStock:String(p.minStock), costPrice:String(p.costPrice||0) }); setEditingId(p.id); setShowForm(true); };

  const save = async () => {
    if (!form.name.trim() || !form.code.trim()) { props.showToast("ناو و کۆد پێویستن","error"); return; }
    const payload = { name:form.name.trim(), code:form.code.trim(), price:Number(form.price)||0, stock:Number(form.stock)||0, minStock:Number(form.minStock)||0, costPrice:Number(form.costPrice)||0 };
    setBusy(true);
    let ok;
    if (editingId) ok = await props.updateProduct(editingId, payload);
    else ok = await props.addProduct(Object.assign({ id: uid() }, payload));
    setBusy(false);
    if (ok) { props.showToast(editingId ? "نوێکرایەوە" : "زیادکرا"); setShowForm(false); }
  };

  const remove = async (id) => {
    const ok = await props.deleteProduct(id);
    setConfirmDeleteId(null);
    if (ok) props.showToast("سڕایەوە");
  };

  return e("div", null,
    e("div", { style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:22} },
      e("h1", { style:{fontSize:24,fontWeight:800} }, "کاڵاکان"),
      e("button", { onClick:openAdd, style:{display:"flex",alignItems:"center",gap:6,background:"#1F6F78",color:"#fff",border:"none",borderRadius:9,padding:"10px 16px",fontWeight:700,fontSize:14,cursor:"pointer"} }, "➕ زیادکردنی کاڵا")
    ),
    e("div", { style:{position:"relative",marginBottom:18} },
      e("span", { style:{position:"absolute",right:14,top:"50%",transform:"translateY(-50%)",color:"#8B96A0"} }, "🔍"),
      e("input", { value:query, onChange:(ev)=>setQuery(ev.target.value), placeholder:"گەڕان بە ناو یان کۆد...", style:{width:"100%",padding:"11px 42px 11px 14px",borderRadius:10,border:"1px solid #DDE3E6",fontSize:14,background:"#fff",boxSizing:"border-box"} })
    ),
    showForm ? e("div", { style:{background:"#fff",borderRadius:14,padding:20,border:"1px solid #DDE3E6",marginBottom:18} },
      e("div", { style:{fontWeight:700,marginBottom:14} }, editingId ? "دەستکاریکردنی کاڵا" : "کاڵای نوێ"),
      e("div", { style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:12} },
        e(FormField, { label:"ناوی ڕادیەتەر", value:form.name, onChange:(v)=>setForm(Object.assign({},form,{name:v})) }),
        e(FormField, { label:"کۆد", value:form.code, onChange:(v)=>setForm(Object.assign({},form,{code:v})), mono:true }),
        e(FormField, { label:"نرخی کڕین (مایە)", value:form.costPrice, onChange:(v)=>setForm(Object.assign({},form,{costPrice:v})), mono:true, type:"number" }),
        e(FormField, { label:"نرخی فرۆشتن (د.ع)", value:form.price, onChange:(v)=>setForm(Object.assign({},form,{price:v})), mono:true, type:"number" }),
        e(FormField, { label:"بڕی کۆگا", value:form.stock, onChange:(v)=>setForm(Object.assign({},form,{stock:v})), mono:true, type:"number" }),
        e(FormField, { label:"کەمترین ڕادە (ئاگاداری)", value:form.minStock, onChange:(v)=>setForm(Object.assign({},form,{minStock:v})), mono:true, type:"number" })
      ),
      e("div", { style:{display:"flex",gap:10} },
        e("button", { onClick:save, disabled:busy, style:{background:"#1F6F78",color:"#fff",border:"none",borderRadius:8,padding:"10px 18px",fontWeight:700,cursor:"pointer"} }, busy ? "چاوەڕوان بە..." : "پاشەکەوتکردن"),
        e("button", { onClick:()=>setShowForm(false), style:{background:"#EEF1F3",color:"#1C2126",border:"none",borderRadius:8,padding:"10px 18px",fontWeight:600,cursor:"pointer"} }, "پاشگەزبوونەوە")
      )

        e("div", { style:{minWidth:160} },

        ),

          e("div", { style:{fontFamily:"'JetBrains Mono', monospace",fontSize:11,color:"#8B96A0"} }, "مایە: "+fmtNum(p.costPrice)+" د.ع")
        ),

function LedgerTab(props) {
  const entries = props.entries;
  const year = new Date().getFullYear();
  const [month, setMonth] = useState(null);
  const [day, setDay] = useState(null);

  const monthTotals = useMemo(() => {
    const totals = new Array(12).fill(0);
    entries.forEach((j) => { const d = new Date(j.date); if (d.getFullYear() === year) totals[d.getMonth()] += j.profit; });
    return totals;
  }, [entries, year]);

  const daysInMonth = useMemo(() => {
    if (month === null) return [];
    const map = {};
    entries.forEach((j) => {
      const d = new Date(j.date);
      if (d.getFullYear() === year && d.getMonth() === month) {
        const dd = d.getDate();
        if (!map[dd]) map[dd] = { count:0, profit:0 };
        map[dd].count++; map[dd].profit += j.profit;
      }
    });
    return Object.keys(map).map(k=>Number(k)).sort((a,b)=>b-a).map(dd => Object.assign({ day: dd }, map[dd]));
  }, [entries, month, year]);

  const dayEntries = useMemo(() => {
    if (month === null || day === null) return [];
    return entries.filter((j) => { const d = new Date(j.date); return d.getFullYear()===year && d.getMonth()===month && d.getDate()===day; })
      .sort((a,b)=>new Date(b.date)-new Date(a.date));
  }, [entries, month, day, year]);

  if (month === null) {
    return e("div", null,
      e("div", { style:{fontWeight:700,marginBottom:14,fontSize:15} }, "ساڵی " + year),
      e("div", { style:{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:10} },
        KURDISH_MONTHS.map((m, i) => e("button", { key:i, onClick:()=>setMonth(i),
          style:{ background:"#fff", border:"1px solid #DDE3E6", borderRadius:12, padding:"16px 10px", cursor:"pointer", textAlign:"center" } },
          e("div", { style:{fontWeight:700,fontSize:14,marginBottom:6} }, m),
          e("div", { style:{fontSize:12,color: monthTotals[i]>=0?"#1F6F78":"#C0392B",fontFamily:"'JetBrains Mono', monospace"} }, fmtNum(monthTotals[i])+" د.ع")
        ))
      )
    );
  }

  if (day === null) {
    return e("div", null,
      e(BackBtn, { onClick:()=>setMonth(null) }),
      e("div", { style:{fontWeight:700,marginBottom:14,fontSize:15} }, KURDISH_MONTHS[month] + " " + year),
      daysInMonth.length === 0 ? e("div", { style:{color:"#8B96A0",fontSize:14} }, "هیچ تۆمارێک لەم مانگە نییە") :
        e("div", { style:{display:"flex",flexDirection:"column",gap:8} },
          daysInMonth.map((d) => e("button", { key:d.day, onClick:()=>setDay(d.day),
            style:{ background:"#fff", border:"1px solid #DDE3E6", borderRadius:12, padding:"14px 16px", cursor:"pointer", display:"flex", justifyContent:"space-between", textAlign:"right" } },
            e("span", { style:{fontWeight:600} }, "ڕۆژی " + d.day + " (" + d.count + " تۆمار)"),
            e("span", { style:{fontFamily:"'JetBrains Mono', monospace",fontWeight:700,color: d.profit>=0?"#1F6F78":"#C0392B"} }, fmtNum(d.profit)+" د.ع")
          ))
        )
    );
  }

  const dayCost = dayEntries.reduce((s,j)=>s+j.costPrice,0);
  const daySale = dayEntries.reduce((s,j)=>s+j.salePrice,0);
  const dayProfit = dayEntries.reduce((s,j)=>s+j.profit,0);

  return e("div", null,
    e(BackBtn, { onClick:()=>setDay(null) }),
    e("div", { style:{fontWeight:700,marginBottom:14,fontSize:15} }, KURDISH_MONTHS[month] + " " + day + "، " + year),
    e("div", { style:{background:"#fff",borderRadius:14,border:"1px solid #DDE3E6",overflow:"hidden"} },
      e("div", { style:{display:"grid",gridTemplateColumns:"2fr 1fr 1fr 1fr",padding:"10px 14px",background:"#EEF1F3",fontSize:12,fontWeight:700,color:"#6B7580"} },
        e("span", null, "جۆر/ناو"), e("span", null, "مایە"), e("span", null, "فرۆشتن"), e("span", null, "قازانج")
      ),
      dayEntries.map((j) => e("div", { key:j.id, style:{display:"grid",gridTemplateColumns:"2fr 1fr 1fr 1fr",padding:"12px 14px",borderTop:"1px solid #EEF1F3",fontSize:13.5,alignItems:"center"} },
        e("div", null,
          e("div", { style:{fontWeight:600} }, j.productName || j.workType),
          e("div", { style:{fontSize:11,color:"#8B96A0"} }, j.category)
        ),
        e("span", { style:{fontFamily:"'JetBrains Mono', monospace"} }, fmtNum(j.costPrice)),
        e("span", { style:{fontFamily:"'JetBrains Mono', monospace"} }, fmtNum(j.salePrice)),
        e("span", { style:{fontFamily:"'JetBrains Mono', monospace",fontWeight:700,color:j.profit>=0?"#1F6F78":"#C0392B"} }, fmtNum(j.profit))
      )),
      e("div", { style:{display:"grid",gridTemplateColumns:"2fr 1fr 1fr 1fr",padding:"12px 14px",borderTop:"2px solid #DDE3E6",fontSize:13.5,fontWeight:800,background:"#EEF1F3"} },
        e("span", null, "کۆی گشتی"),
        e("span", { style:{fontFamily:"'JetBrains Mono', monospace"} }, fmtNum(dayCost)),
        e("span", { style:{fontFamily:"'JetBrains Mono', monospace"} }, fmtNum(daySale)),
        e("span", { style:{fontFamily:"'JetBrains Mono', monospace",color:"#1F6F78"} }, fmtNum(dayProfit))
      )
    )
  );
}

function JobsTab(props) {
  const [subTab, setSubTab] = useState(CAT_TANK);
  const subItems = [
    { key: CAT_TANK, label: "گۆڕینی قازان" },
    { key: CAT_RADIATOR, label: "فرۆشتنی ڕادیاتەر و مواد" },
    { key: CAT_LABOR, label: "ئیشی دەستی" },
    { key: "ledger", label: "هەژماری ڕۆژانە" }
  ];
  return e("div", null,
    e("h1", { style:{fontSize:24,fontWeight:800,marginBottom:18} }, "ئیش"),
    e("div", { style:{display:"flex",gap:8,marginBottom:20,flexWrap:"wrap"} },
      subItems.map((it) => e("button", { key:it.key, onClick:()=>setSubTab(it.key),
        style:{ background: subTab===it.key ? "#1F6F78" : "#fff", color: subTab===it.key ? "#fff":"#1C2126", border:"1px solid #DDE3E6", borderRadius:9, padding:"9px 14px", fontSize:13.5, fontWeight:600, cursor:"pointer" } }, it.label))
    ),
    subTab === CAT_TANK ? e(ProductJobForm, { category:CAT_TANK, products:props.products, entries:props.jobEntries, onSave:props.addJobEntry, showToast:props.showToast }) : null,
    subTab === CAT_RADIATOR ? e(ProductJobForm, { category:CAT_RADIATOR, products:props.products, entries:props.jobEntries, onSave:props.addJobEntry, showToast:props.showToast }) : null,
    subTab === CAT_LABOR ? e(LaborJobForm, { entries:props.jobEntries, onSave:props.addJobEntry, showToast:props.showToast }) : null,
    subTab === "ledger" ? e(LedgerTab, { entries:props.jobEntries }) : null
  );
}

function SoldTab(props) {
  const combined = useMemo(() => {
    const fromSales = props.sales.map((s) => ({ id: "s-"+s.id, date: s.date, name: s.productName, qty: s.qty, total: s.total, note: s.customerName }));
    const fromJobs = props.jobEntries.filter((j) => j.category !== CAT_LABOR).map((j) => ({ id: "j-"+j.id, date: j.date, name: j.productName, qty: 1, total: j.salePrice, note: j.customerNote || j.category }));
    return fromSales.concat(fromJobs);
  }, [props.sales, props.jobEntries]);
  const year = new Date().getFullYear();
  const [month, setMonth] = useState(null);

  const monthTotals = useMemo(() => {
    const totals = new Array(12).fill(0);
    combined.forEach((s) => { const d = new Date(s.date); if (d.getFullYear() === year) totals[d.getMonth()] += s.total; });
    return totals;
  }, [combined, year]);

  const monthSales = useMemo(() => {
    if (month === null) return [];
    return combined.filter((s) => { const d = new Date(s.date); return d.getFullYear()===year && d.getMonth()===month; })
      .sort((a,b)=>new Date(b.date)-new Date(a.date));
  }, [combined, month, year]);

  if (month === null) {
    return e("div", null,
      e("h1", { style:{fontSize:24,fontWeight:800,marginBottom:18} }, "فرۆشراو"),
      e("div", { style:{fontWeight:700,marginBottom:14,fontSize:15} }, "ساڵی " + year),
      e("div", { style:{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:10} },
        KURDISH_MONTHS.map((m, i) => e("button", { key:i, onClick:()=>setMonth(i),
          style:{ background:"#fff", border:"1px solid #DDE3E6", borderRadius:12, padding:"16px 10px", cursor:"pointer", textAlign:"center" } },
          e("div", { style:{fontWeight:700,fontSize:14,marginBottom:6} }, m),
          e("div", { style:{fontSize:12,color:"#1F6F78",fontFamily:"'JetBrains Mono', monospace"} }, fmtNum(monthTotals[i])+" د.ع")
        ))
      )
    );
  }

  return e("div", null,
    e("h1", { style:{fontSize:24,fontWeight:800,marginBottom:18} }, "فرۆشراو"),
    e(BackBtn, { onClick:()=>setMonth(null) }),
    e("div", { style:{fontWeight:700,marginBottom:14,fontSize:15} }, KURDISH_MONTHS[month] + " " + year),
    monthSales.length === 0 ? e("div", { style:{color:"#8B96A0",fontSize:14} }, "هیچ فرۆشتنێک لەم مانگە نییە") :
      e("div", { style:{display:"flex",flexDirection:"column",gap:8} },
        monthSales.map((s) => e("div", { key:s.id, style:{background:"#fff",border:"1px solid #DDE3E6",borderRadius:12,padding:"12px 14px",display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:6} },
          e("div", null,
            e("div", { style:{fontWeight:700,fontSize:14} }, s.name + " × " + s.qty),
            e("div", { style:{fontSize:11.5,color:"#8B96A0"} }, new Date(s.date).getDate()+" "+KURDISH_MONTHS[new Date(s.date).getMonth()]+" · "+s.note)
          ),
          e("span", { style:{fontFamily:"'JetBrains Mono', monospace",fontWeight:700} }, fmtNum(s.total)+" د.ع")
        ))
      )
  );
}

function App() {
  const [unlocked, setUnlocked] = useState(() => {
    try { return localStorage.getItem("shop-unlocked") === "1"; } catch (err) { return false; }
  });
  const [loading, setLoading] = useState(true);
  const [loadError, setLoadError] = useState(null);
  const [products, setProducts] = useState([]);
  const [sales, setSales] = useState([]);
  const [customers, setCustomers] = useState([]);
  const [jobEntries, setJobEntries] = useState([]);
  const [tab, setTab] = useState("dashboard");
  const [toast, setToast] = useState(null);

  const showToast = (msg, kind) => { setToast({ msg, kind: kind || "success" }); setTimeout(() => setToast(null), 2600); };

  useEffect(() => {
    (async () => {
      try {
        const [pData, sData, cData, jData] = await Promise.all([sbSelect('products'), sbSelect('sales'), sbSelect('customers'), sbSelect('job_entries')]);
        setProducts(pData.map(rowToProduct));
        setSales(sData.map(rowToSale));
        setCustomers(cData);
        setJobEntries(jData.map(rowToJob));
      } catch (err) {
        setLoadError(err.message);
      }
      setLoading(false);
    })();
  }, []);

  const addProduct = useCallback(async (payload) => {
    try {
      await sbInsert('products', productToRow(payload));
      setProducts((prev) => prev.concat([payload]));
      return true;
    } catch (err) { showToast("هەڵە: " + err.message, "error"); return false; }
  }, []);

  const updateProduct = useCallback(async (id, payload) => {
    try {
      await sbUpdate('products', id, productPatch(payload));
      setProducts((prev) => prev.map((p) => p.id === id ? Object.assign({}, p, payload) : p));
      return true;
    } catch (err) { showToast("هەڵە: " + err.message, "error"); return false; }
  }, []);

  const deleteProduct = useCallback(async (id) => {
    try {
      await sbDelete('products', id);
      setProducts((prev) => prev.filter((p) => p.id !== id));
      return true;
    } catch (err) { showToast("هەڵە: " + err.message, "error"); return false; }
  }, []);

  const addCustomer = useCallback(async (customer) => {
    try {
      await sbInsert('customers', customer);
      setCustomers((prev) => prev.concat([customer]));
      return customer;
    } catch (err) { showToast("هەڵە: " + err.message, "error"); return null; }
  }, []);

  const recordSale = useCallback(async (sale, product) => {
    try {
      await sbInsert('sales', saleToRow(sale));
      const newStock = product.stock - sale.qty;
      try { await sbUpdate('products', product.id, { stock: newStock }); }
      catch (stockErr) { showToast("هەڵە لە نوێکردنەوەی کۆگا: " + stockErr.message, "error"); }
      setSales((prev) => prev.concat([sale]));
      setProducts((prev) => prev.map((p) => p.id === product.id ? Object.assign({}, p, { stock: newStock }) : p));
      return true;
    } catch (err) { showToast("هەڵە: " + err.message, "error"); return false; }
  }, []);

  const addJobEntry = useCallback(async (entry, product) => {
    try {
      await sbInsert('job_entries', jobToRow(entry));
      setJobEntries((prev) => prev.concat([entry]));
      if (product) {
        const newStock = product.stock - 1;
        try {
          await sbUpdate('products', product.id, { stock: newStock });
          setProducts((prev) => prev.map((p) => p.id === product.id ? Object.assign({}, p, { stock: newStock }) : p));
        } catch (stockErr) { showToast("هەڵە لە نوێکردنەوەی کۆگا: " + stockErr.message, "error"); }
      }
      return true;
    } catch (err) { showToast("هەڵە: " + err.message, "error"); return false; }
  }, []);

  const allSaleEvents = useMemo(() => {
    const fromJobs = jobEntries.filter((j) => j.category !== CAT_LABOR).map((j) => ({ id: "j-"+j.id, productName: j.productName, qty: 1, total: j.salePrice, date: j.date }));
    return sales.concat(fromJobs);
  }, [sales, jobEntries]);

  const revenue = useMemo(() => {
    const start7 = daysAgo(6), start30 = daysAgo(29);
    let week = 0, month = 0;
    const dailyMap = {};
    for (let i = 6; i >= 0; i--) { dailyMap[daysAgo(i).toDateString()] = 0; }
    allSaleEvents.forEach((s) => {
      const d = new Date(s.date);
      if (d >= start7) week += s.total;
      if (d >= start30) month += s.total;
      const key = new Date(d.getFullYear(), d.getMonth(), d.getDate()).toDateString();
      if (key in dailyMap) dailyMap[key] += s.total;
    });
    const dailySeries = Object.keys(dailyMap).map((k) => ({ label: new Date(k).getDate(), value: dailyMap[k] }));
    return { week, month, dailySeries };
  }, [allSaleEvents]);

  const lowStock = useMemo(() => products.filter((p) => p.stock <= p.minStock), [products]);
  const recentSales = useMemo(() => allSaleEvents.slice().sort((a,b) => new Date(b.date)-new Date(a.date)).slice(0,8), [allSaleEvents]);

  if (!unlocked) {
    return e(LockScreen, { onUnlock: () => setUnlocked(true) });
  }

  if (loading) {
    return e("div", { style:{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",fontFamily:"'Vazirmatn', sans-serif",color:"#1C2126"} }, "چاوەڕوان بە، پەیوەستبوون بە داتابەیس...");
  }
  if (loadError) {
    return e("div", { dir:"rtl", style:{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",fontFamily:"'Vazirmatn', sans-serif",color:"#C0392B",padding:20,textAlign:"center"} },
      "کێشەیەک هەیە لە پەیوەستبوون بە داتابەیس: " + loadError
    );
  }

  return e("div", { dir:"rtl", style:{fontFamily:"'Vazirmatn', sans-serif",background:"#EEF1F3",minHeight:"100vh",color:"#1C2126",display:"flex"} },
    e(Sidebar, { tab, setTab, lowStockCount: lowStock.length }),
    e("main", { style:{flex:1,padding:"28px 32px",maxWidth:1100} },
      tab === "dashboard" ? e(Dashboard, { revenue, lowStock, recentSales, productsCount: products.length }) : null,
      tab === "sell" ? e(SellTab, { products, customers, addCustomer, recordSale, showToast }) : null,
      tab === "inventory" ? e(InventoryTab, { products, addProduct, updateProduct, deleteProduct, showToast }) : null,
      tab === "customers" ? e(CustomersTab, { customers, sales, addCustomer, showToast }) : null,
      tab === "jobs" ? e(JobsTab, { products, jobEntries, addJobEntry, showToast }) : null,
      tab === "sold" ? e(SoldTab, { sales, jobEntries }) : null
    ),
    toast ? e("div", { style:{position:"fixed",bottom:24,left:24,background: toast.kind==="error"?"#C0392B":"#1F6F78",color:"#fff",padding:"12px 20px",borderRadius:10,fontWeight:600,fontSize:14,boxShadow:"0 8px 24px rgba(0,0,0,.18)",zIndex:100,maxWidth:320} }, toast.msg) : null
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(e(App));
</script>
</body>
